<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="images/icons/wind-solid.svg" />
    <title>Spotty | Website</title>
    <link rel="stylesheet" href="styles.css" />
    <script
      src="https://kit.fontawesome.com/1d9ff175a7.js"
      crossorigin="anonymous"
    ></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Navbar Section -->
    <nav class="navbar">
      <div class="navbar__container">
        <a href="/" id="navbar__logo"><i class="fa-solid fa-wind"></i>Spotty</a>
        <div class="navbar__toogle" id="mobile-menu">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </div>
        <ul class="navbar__menu">
          <li class="navbar__item">
            <a href="/" class="navbar__links">Home</a>
          </li>
          <li class="navbar__item">
            <a href="/dash.html" class="navbar__links">Kite</a>
          </li>
          <li class="navbar__item">
            <a href="/dash.html" class="navbar__links">Surf</a>
          </li>
          <li class="navbar__btn">
            <a href="/dash.html" class="button">Add Spots</a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Hero Section -->
    <div class="main">
      <div class="main__container">
        <div class="main__content">
          <h1>SPOT CHECK</h1>
          <h2>WITH EASE</h2>
          <p>Estimate your spot to kite and surf</p>
          <a href="/dash.html">
            <button class="main__btn">
              <span>Get Started</span>
            </button>
          </a>
        </div>
        <div class="main__img--container">
          <img src="images/pic1.svg" alt="pic" id="main__img" />
        </div>
      </div>
    </div>

    <!-- Patrick fragen warum div notwendig-->

    <!-- Services Section -->
    <div class="services">
      <h1>Get your spots checked</h1>
    </div>
    <script src="app.js"></script>
  </body>
</html>
