  <body>
    <div class="limiter">
      <div class="container-table100">
        <!-- TEST LOGIN -->
        <button
          class="loginbtns"
          id="loginbtn"
          onclick="document.getElementById('id01').style.display='block'"
          style="width: auto"
        >
          Login
        </button>
        <div id="id01" class="modal">
          <form class="modal-content animate">
            <div class="imgcontainer">
              <span
                onclick="document.getElementById('id01').style.display='none'"
                class="close"
                title="Close Modal"
                >&times;</span
              >
            </div>
            <div class="container">
              <label for="uname"><b>Username</b></label>
              <input
                id="logintext"
                type="text"
                placeholder="Enter Username"
                name="uname"
                required
              />
              <label for="psw"><b>Password</b></label>
              <input
                id="passwordtext"
                type="password"
                placeholder="Enter Password"
                name="psw"
                required
              />
              <button class="loginbtns" id="innerloginbtn" type="button">
                Working soon!
              </button>
              <label>
                <input type="checkbox" checked="checked" name="remember" />
                Remember me
              </label>
            </div>
            <div class="container" style="background-color: #f1f1f1">
              <button
                type="button"
                onclick="document.getElementById('id01').style.display='none'"
                class="cancelbtn"
              >
                Cancel
              </button>
              <span class="psw">Forgot <a href="#">password?</a></span>
            </div>
          </form>
        </div>
        <!-- TEST LOGIN -->
        <!-- Test Add -->
        <div class="add">
          <button class="btns" id="addbtn">Add Spot</button>
          <div class="inputter">
            <input
              type="text"
              class="form__input"
              id="name"
              placeholder="Spotname"
              onfocus="this.value=''"
              required=""
            />
            <label for="name" class="form__label">Spotname</label>
          </div>
        </div>
        <!-- Test Add -->
        <div class="wrap-table100">
          <div id="settings">
            <div id="settings1">
              <div class="kntsetter">
                <button id="kntleft">
                  <i id="setter" class="fa-solid fa-caret-left"></i>
                </button>
                <button id="kntright">
                  <i id="setter" class="fa-solid fa-caret-right"></i>
                </button>
              </div>
              <div class="degsetter">
                <button id="degleft">
                  <i id="setter" class="fa-solid fa-caret-left"></i>
                </button>
                <button id="degright">
                  <i id="setter" class="fa-solid fa-caret-right"></i>
                </button>
              </div>
            </div>
            <div id="settings2">
              <button class="btns" id="applybtn">Apply Settings</button>
              <div class="knotslider">
                <!-- set value in resetBtn (dash.js) -->
                <input
                  type="range"
                  min="5"
                  max="50"
                  value="14"
                  step="1"
                  id="knotslider"
                  orient="horizontal"
                  onclick="this.nextElementSibling.value = this.value"
                  oninput="this.nextElementSibling.value = this.value"
                />
                <output id="slidertext"></output>
                <label for="knotslider" id="slidertext">knots</label>
              </div>
              <div class="degslider">
                <!-- set value in resetBtn (dash.js) -->
                <input
                  type="range"
                  min="0"
                  max="50"
                  value="0"
                  step="1"
                  id="degslider"
                  orient="horizontal"
                  onclick="this.nextElementSibling.value = this.value"
                  oninput="this.nextElementSibling.value = this.value"
                />
                <output id="slidertext"></output>
                <label for="degslider" id="slidertext">deg offset</label>
              </div>
              <button class="btns" id="resetbtn">Reset Settings</button>
            </div>
